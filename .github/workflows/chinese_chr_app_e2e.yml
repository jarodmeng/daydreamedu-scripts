name: chinese-chr-app e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "chinese_chr_app/chinese_chr_app/**"
      - ".github/workflows/chinese_chr_app_e2e.yml"
  push:
    branches: ["main"]
    paths:
      - "chinese_chr_app/chinese_chr_app/**"
      - ".github/workflows/chinese_chr_app_e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: chinese_chr_app/chinese_chr_app/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chinese_chr_app/chinese_chr_app/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight E2E env
        id: preflight
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE_DB_URL }}
        run: |
          missing=()
          if [ -n "${SUPABASE_URL:-}" ]; then
            echo "SUPABASE_URL: present"
          else
            missing+=("SUPABASE_URL (or VITE_SUPABASE_URL secret)")
          fi
          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL: present"
          else
            missing+=("DATABASE_URL (or SUPABASE_DB_URL secret)")
          fi
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            for item in "${missing[@]}"; do
              echo "::warning::Missing ${item}"
            done
            echo "::warning::Skipping E2E on pull_request because required repo secrets are unavailable. Use workflow_dispatch after secrets are configured."
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for item in "${missing[@]}"; do
            echo "::error::Missing ${item}"
          done
          echo "can_run=false" >> "$GITHUB_OUTPUT"
          exit 1
      - name: Skip E2E (PR without secrets)
        if: steps.preflight.outputs.can_run != 'true'
        run: echo "E2E skipped for this pull_request run. Use workflow_dispatch to run after secrets are available."

      - name: Install backend deps
        if: steps.preflight.outputs.can_run == 'true'
        run: python3 -m pip install -r ../backend/requirements.txt

      - name: Install frontend deps
        if: steps.preflight.outputs.can_run == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.preflight.outputs.can_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.preflight.outputs.can_run == 'true'
        run: npx playwright test --project=chromium
        env:
          E2E_PYTHON: python3
          # Backend is DB-only at startup; pass CI secrets through to Playwright webServer.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: chinese_chr_app/chinese_chr_app/frontend/playwright-report
